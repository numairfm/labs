<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JUKEBOX - STATIC TOOLBOX</title>
  <link rel="stylesheet" href="./assets/css/main.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <script>
    // FOUC (Flash of Unstyled Content) / FLT (Flash of Light Theme) Prevention
    (function() {
      let savedTheme = 'light';
      try {
        savedTheme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (e) {}
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    .search-box {
      margin: 2rem auto;
      max-width: 600px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 1rem 1.5rem;
      background-color: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: 0;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 1.1rem;
      font-weight: 500;
      outline: none;
      box-shadow: var(--shadow-main);
      transition: border-color 0.15s ease;
    }
    .search-input:focus {
      border-color: var(--accent-blue);
    }
    .filter-chips {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3.5rem;
    }
    .chip {
      padding: 0.5rem 1.25rem;
      border: 2px solid var(--border-color);
      background-color: var(--bg-card);
      border-radius: 0;
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: 2px 2px 0px var(--border-color);
      transition: all 0.1s ease;
    }
    .chip.active, .chip:hover {
      background-color: var(--accent-blue);
      color: white;
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0px var(--border-color);
    }
    .chip:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0px var(--border-color);
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 1.1rem;
      font-weight: 600;
      border: 2px dashed var(--border-color);
    }
  </style>
</head>
<body class="container">
  <header class="header">
    <h1 style="font-size: 3rem; letter-spacing: 0.15em; font-weight: 900;">JUKEBOX</h1>
    <button id="theme-toggle-btn" class="btn-icon" aria-label="Toggle Theme" title="Toggle Light/Dark Theme" style="font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em;">THEME</button>
  </header>

  <div class="search-box">
    <input type="text" id="search-bar" class="search-input" placeholder="SEARCH TOOLS...">
  </div>

  <div id="filter-chips" class="filter-chips">
    <button class="chip active" data-category="All">All</button>
    <button class="chip" data-category="Media">Media</button>
    <button class="chip" data-category="Utilities">Utilities</button>
    <button class="chip" data-category="Music">Music</button>
    <button class="chip" data-category="Toys">Toys</button>
  </div>

  <main id="tools-grid" class="tools-grid">
    <!-- Dynamic grid populated by main.js -->
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
