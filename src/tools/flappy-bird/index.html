<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
  <header class="header">
    <a href="/" class="button">Back</a>
    <h1>Flappy Bird</h1>
    <button id="theme-toggle" class="button">Toggle Theme</button>
  </header>
  
  <main class="game-container">
    <div id="ui-layer">
      <div id="start-screen" class="screen active">
        <h2>Flappy Bird</h2>
        <p>Click or Space to jump</p>
        <button id="start-btn" class="button">Start Game</button>
      </div>
      <div id="game-over-screen" class="screen">
        <h2>Game Over!</h2>
        <p>Score: <span id="final-score">0</span></p>
        <p>Best: <span id="best-score">0</span></p>
        <button id="restart-btn" class="button">Play Again</button>
      </div>
      <div id="hud">
        <span id="score-display" style="display: none;">0</span>
      </div>
    </div>
    <canvas id="game-canvas" width="800" height="600"></canvas>
  </main>
  
  <script type="module" src="main.js"></script>
</body>
</html>
