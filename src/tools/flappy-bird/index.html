<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird - JUKEBOX</title>
  <meta name="description" content="Flap your way through procedurally generated pipes. Click or press Space to jump!">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./style.css">
  <script>
    (function() {
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e) {}
    })();
  </script>
</head>
<body>

  <!-- Header -->
  <header class="flappy-header">
    <a href="/labs/" class="btn-icon" title="Back to Hub" aria-label="Back to Hub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1>FLAPPY BIRD</h1>
    <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
      </svg>
    </button>
  </header>

  <!-- Game -->
  <main class="game-container">
    <div id="ui-layer">
      <div id="start-screen" class="screen active">
        <h2>Flappy Bird</h2>
        <p>Tap, Click or Space to jump</p>
        <button id="start-btn" class="button">Start Game</button>
      </div>
      <div id="game-over-screen" class="screen">
        <h2>Game Over</h2>
        <p>Score: <span id="final-score">0</span> &nbsp;|&nbsp; Best: <span id="best-score">0</span></p>
        <button id="restart-btn" class="button">Play Again</button>
      </div>
      <div id="hud">
        <span id="score-display" style="display: none;">0</span>
      </div>
    </div>
    <canvas id="game-canvas" width="400" height="580"></canvas>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
