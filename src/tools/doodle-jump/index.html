<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Jump - JUKEBOX</title>
  <meta name="description" content="Auto-jumping platformer. Navigate platforms and see how high you can go!">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./style.css">
  <script>
    (function() {
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e) {}
    })();
  </script>
</head>
<body class="doodle-body">
  <header class="header absolute-header">
    <a href="/labs/" class="btn-icon header-btn" title="Back to Hub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1 style="letter-spacing:0.05em;font-size:1.1rem;">DOODLE JUMP</h1>
    <button id="theme-btn" class="btn-icon header-btn" aria-label="Toggle Theme">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
      </svg>
    </button>
  </header>

  <main class="doodle-main">
    <div class="score-bar">
      <span class="score-label">HEIGHT</span>
      <span id="score" class="score-val">0</span>
      <span class="score-label">BEST</span>
      <span id="best-score" class="score-val">0</span>
    </div>
    <div class="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="overlay" class="overlay">
        <div class="overlay-inner">
          <h2>DOODLE JUMP</h2>
          <p>← → or A D to move</p>
          <button id="start-btn">START</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
