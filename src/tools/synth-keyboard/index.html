<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Synthesizer - JUKEBOX</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./style.css">
  <script>
    (function() {
      let savedTheme = 'light';
      try { savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } catch (e) {}
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body class="container">
  <header class="header">
    <a href="/labs/" class="btn-icon" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;" title="Back to Hub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1 style="letter-spacing: 0.05em;">RETRO SYNTHESIZER</h1>
    <button id="theme-btn" class="btn-icon" aria-label="Toggle Theme" style="display: inline-flex; align-items: center; justify-content: center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
      </svg>
    </button>
  </header>

  <main class="workspace-wrapper">
    <div class="synth-panel card">
      <!-- Waveform and Vol Control row -->
      <div class="top-controls">
        <div class="control-group">
          <span class="control-title">WAVEFORM</span>
          <div class="waveform-selectors">
            <button class="waveform-btn active" data-type="piano" title="Acoustic Piano">PIANO</button>
            <button class="waveform-btn" data-type="sine" title="Sine Wave">SINE</button>
            <button class="waveform-btn" data-type="square" title="Square Wave">SQR</button>
            <button class="waveform-btn" data-type="sawtooth" title="Sawtooth Wave">SAW</button>
            <button class="waveform-btn" data-type="triangle" title="Triangle Wave">TRI</button>
          </div>
        </div>

        <div class="control-group" style="flex-grow: 1; max-width: 240px;">
          <div class="control-row">
            <span class="control-title">MASTER VOL</span>
            <span id="vol-val" class="control-val">70%</span>
          </div>
          <input type="range" id="master-vol" min="0" max="1" step="0.05" value="0.7">
        </div>
      </div>

      <!-- ADSR Envelopes sliders row -->
      <div class="adsr-controls">
        <span class="section-title">ADSR ENVELOPE</span>
        <div class="sliders-grid">
          <div class="slider-box">
            <span class="slider-name">ATTACK</span>
            <input type="range" id="adsr-a" min="0.01" max="2" step="0.05" value="0.1">
            <span id="adsr-a-val" class="slider-value">0.1s</span>
          </div>
          <div class="slider-box">
            <span class="slider-name">DECAY</span>
            <input type="range" id="adsr-d" min="0.01" max="2" step="0.05" value="0.2">
            <span id="adsr-d-val" class="slider-value">0.2s</span>
          </div>
          <div class="slider-box">
            <span class="slider-name">SUSTAIN</span>
            <input type="range" id="adsr-s" min="0" max="1" step="0.05" value="0.6">
            <span id="adsr-s-val" class="slider-value">60%</span>
          </div>
          <div class="slider-box">
            <span class="slider-name">RELEASE</span>
            <input type="range" id="adsr-r" min="0.01" max="3" step="0.05" value="0.6">
            <span id="adsr-r-val" class="slider-value">0.6s</span>
          </div>
        </div>
      </div>

      <!-- Overlapping piano keyboard -->
      <div class="keyboard-container">
        <div class="keyboard-keys" id="piano-keyboard">
          <!-- White keys -->
          <div class="key white-key" data-note="C4" data-key="A">
            <span class="key-label">C4<br><kbd>A</kbd></span>
          </div>
          <div class="key white-key" data-note="D4" data-key="S">
            <span class="key-label">D4<br><kbd>S</kbd></span>
          </div>
          <div class="key white-key" data-note="E4" data-key="D">
            <span class="key-label">E4<br><kbd>D</kbd></span>
          </div>
          <div class="key white-key" data-note="F4" data-key="F">
            <span class="key-label">F4<br><kbd>F</kbd></span>
          </div>
          <div class="key white-key" data-note="G4" data-key="G">
            <span class="key-label">G4<br><kbd>G</kbd></span>
          </div>
          <div class="key white-key" data-note="A4" data-key="H">
            <span class="key-label">A4<br><kbd>H</kbd></span>
          </div>
          <div class="key white-key" data-note="B4" data-key="J">
            <span class="key-label">B4<br><kbd>J</kbd></span>
          </div>
          <div class="key white-key" data-note="C5" data-key="K">
            <span class="key-label">C5<br><kbd>K</kbd></span>
          </div>
          <div class="key white-key" data-note="D5" data-key="L">
            <span class="key-label">D5<br><kbd>L</kbd></span>
          </div>
          <div class="key white-key" data-note="E5" data-key=";">
            <span class="key-label">E5<br><kbd>;</kbd></span>
          </div>
          <div class="key white-key" data-note="F5" data-key="'">
            <span class="key-label">F5<br><kbd>'</kbd></span>
          </div>

          <!-- Black keys, absolutely placed -->
          <div class="key black-key" data-note="C#4" data-key="W" style="left: 6.8%;">
            <span class="key-label">C#4<br><kbd>W</kbd></span>
          </div>
          <div class="key black-key" data-note="D#4" data-key="E" style="left: 15.9%;">
            <span class="key-label">D#4<br><kbd>E</kbd></span>
          </div>
          
          <div class="key black-key" data-note="F#4" data-key="T" style="left: 34.1%;">
            <span class="key-label">F#4<br><kbd>T</kbd></span>
          </div>
          <div class="key black-key" data-note="G#4" data-key="Y" style="left: 43.2%;">
            <span class="key-label">G#4<br><kbd>Y</kbd></span>
          </div>
          <div class="key black-key" data-note="A#4" data-key="U" style="left: 52.3%;">
            <span class="key-label">A#4<br><kbd>U</kbd></span>
          </div>

          <div class="key black-key" data-note="C#5" data-key="O" style="left: 70.5%;">
            <span class="key-label">C#5<br><kbd>O</kbd></span>
          </div>
          <div class="key black-key" data-note="D#5" data-key="P" style="left: 79.6%;">
            <span class="key-label">D#5<br><kbd>P</kbd></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
