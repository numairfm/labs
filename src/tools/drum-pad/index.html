<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Drum Pad - JUKEBOX</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./style.css">
  <script>
    (function() {
      let savedTheme = 'light';
      try { savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } catch (e) {}
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body class="container">
  <header class="header">
    <a href="/labs/" class="btn-icon" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;" title="Back to Hub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1 style="letter-spacing: 0.05em;">VIRTUAL DRUM PAD</h1>
    <button id="theme-btn" class="btn-icon" aria-label="Toggle Theme" style="display: inline-flex; align-items: center; justify-content: center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
      </svg>
    </button>
  </header>

  <main class="workspace-wrapper">
    <div class="synth-panel card">
      <div class="mixer-controls">
        <div class="control-row">
          <span class="label">MASTER VOLUME <span id="vol-val" style="margin-left: 8px;">70%</span></span>
          <div class="kit-selector">
            <button class="kit-btn active" data-kit="acoustic">ACOUSTIC KIT</button>
            <button class="kit-btn" data-kit="synth">808 SYNTH KIT</button>
          </div>
        </div>
        <div class="control-row" style="margin-top: 1rem;">
          <input type="range" id="master-vol" min="0" max="1" step="0.05" value="0.7" style="width: 100%;">
        </div>
      </div>

      <div class="drum-grid">
        <!-- Top Row -->
        <div class="pad" data-pad="kick" data-key="q">
          <span class="pad-label"><kbd>Q</kbd><br>KICK</span>
        </div>
        <div class="pad" data-pad="snare" data-key="w">
          <span class="pad-label"><kbd>W</kbd><br>SNARE</span>
        </div>
        <div class="pad" data-pad="closedhat" data-key="e">
          <span class="pad-label"><kbd>E</kbd><br>HI-HAT</span>
        </div>
        <div class="pad" data-pad="openhat" data-key="r">
          <span class="pad-label"><kbd>R</kbd><br>OPEN HAT</span>
        </div>
        <!-- Bottom Row -->
        <div class="pad" data-pad="hightom" data-key="a">
          <span class="pad-label"><kbd>A</kbd><br>HIGH TOM</span>
        </div>
        <div class="pad" data-pad="lowtom" data-key="s">
          <span class="pad-label"><kbd>S</kbd><br>LOW TOM</span>
        </div>
        <div class="pad" data-pad="cowbell" data-key="d">
          <span class="pad-label"><kbd>D</kbd><br>COWBELL</span>
        </div>
        <div class="pad" data-pad="crash" data-key="f">
          <span class="pad-label"><kbd>F</kbd><br>CRASH / RIDE</span>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
