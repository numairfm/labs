<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="minesweeper-app">
    <header class="header">
        <a href="/" class="btn back-btn" aria-label="Back to home">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back
        </a>
        <h1>Minesweeper</h1>
        <button id="theme-toggle" class="btn theme-toggle" aria-label="Toggle theme">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
    </header>

    <main class="game-container">
        <div class="dashboard brutalist-card">
            <div class="controls">
                <select id="difficulty-select" class="btn">
                    <option value="beginner">Beginner (9x9, 10 mines)</option>
                    <option value="intermediate">Intermediate (16x16, 40 mines)</option>
                    <option value="expert">Expert (30x16, 99 mines)</option>
                </select>
                <button id="reset-btn" class="btn">Reset</button>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <span class="label">Mines</span>
                    <span id="mine-counter" class="value text-red">010</span>
                </div>
                <div class="stat-box face-box">
                    <button id="face-btn" class="face-btn">🙂</button>
                </div>
                <div class="stat-box">
                    <span class="label">Time</span>
                    <span id="timer" class="value text-red">000</span>
                </div>
            </div>
        </div>

        <div class="grid-container brutalist-card">
            <div id="minesweeper-grid" class="minesweeper-grid"></div>
        </div>
    </main>

    <script src="main.js" type="module"></script>
</body>
</html>
