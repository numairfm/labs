<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper - JUKEBOX</title>
  <meta name="description" content="Classic Minesweeper. Left-click to reveal, right-click to flag. Can you clear the board?">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./style.css">
  <script>
    (function() {
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(e) {}
    })();
  </script>
</head>
<body class="minesweeper-app">

  <!-- Header -->
  <header class="ms-header">
    <a href="/" class="btn-icon" title="Back to Hub" aria-label="Back to Hub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1>MINESWEEPER</h1>
    <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
      </svg>
    </button>
  </header>

  <!-- Controls -->
  <div class="controls-bar">
    <select id="difficulty-select" class="ms-select">
      <option value="beginner">Beginner (9×9, 10 mines)</option>
      <option value="intermediate">Intermediate (16×16, 40 mines)</option>
      <option value="expert">Expert (30×16, 99 mines)</option>
    </select>
    <button id="reset-btn" class="ms-btn">New Game</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-label">Mines</span>
      <span id="mine-counter" class="stat-value">010</span>
    </div>
    <button id="face-btn" class="face-btn" aria-label="Reset game">🙂</button>
    <div class="stat-item">
      <span class="stat-label">Time</span>
      <span id="timer" class="stat-value">000</span>
    </div>
  </div>

  <!-- Grid -->
  <div class="game-area">
    <div id="minesweeper-grid" class="minesweeper-grid"></div>
  </div>

  <!-- Win/Loss overlay -->
  <div id="ms-message" class="ms-message">
    <div class="ms-message-inner">
      <h2 id="ms-message-title">You Won!</h2>
      <p id="ms-message-body">All mines flagged.</p>
      <button id="ms-message-btn" class="ms-btn">Play Again</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
