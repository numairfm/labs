<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter - Jukebox</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./style.css">
  <script>
    // FOUC (Flash of Unstyled Content) / FLT (Flash of Light Theme) Prevention
    (function() {
      let savedTheme = 'light';
      try {
        savedTheme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (e) {}
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body class="container">
  <header class="header">
    <a href="/" class="btn-icon" style="text-decoration: none;" title="Back to Hub">←</a>
    <h1>Unit Converter & Calculator</h1>
    <button id="theme-btn" class="btn-icon" aria-label="Toggle Theme">🌓</button>
  </header>

  <main class="workspace-wrapper">
    <div class="converter-box card card-glass">
      <div class="row">
        <label for="converter-type" class="input-label">Conversion Category</label>
        <select id="converter-type" class="select-input">
          <option value="data">Digital Data (Bytes / MB / GB)</option>
          <option value="length">Length (Metric / Imperial)</option>
          <option value="temperature">Temperature (C / F / K)</option>
        </select>
      </div>

      <div class="io-grid">
        <div class="io-card card">
          <label for="input-value" class="input-label">From</label>
          <input type="number" id="input-value" value="1" class="num-input text-input">
          <select id="input-unit" class="select-input"></select>
        </div>

        <div class="io-card card">
          <label for="output-value" class="input-label">To</label>
          <input type="number" id="output-value" readonly class="num-input readonly-input text-input">
          <select id="output-unit" class="select-input"></select>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
