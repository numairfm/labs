<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter - JUKEBOX</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="./style.css">
  <script>
    // FOUC (Flash of Unstyled Content) / FLT (Flash of Light Theme) Prevention
    (function() {
      let savedTheme = 'light';
      try {
        savedTheme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (e) {}
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body class="container">
  <header class="header">
    <a href="/labs/" class="btn-icon" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;" title="Back to Hub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1 style="letter-spacing: 0.05em;">UNIT CONVERTER</h1>
    <button id="theme-btn" class="btn-icon" aria-label="Toggle Theme" style="display: inline-flex; align-items: center; justify-content: center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path>
      </svg>
    </button>
  </header>

  <main class="workspace-wrapper">
    <div class="converter-box card card-glass">
      <div class="row">
        <label for="converter-type" class="input-label">Conversion Category</label>
        <select id="converter-type" class="select-input">
          <option value="data">Digital Data (Bytes / MB / GB)</option>
          <option value="length">Length (Metric / Imperial)</option>
          <option value="temperature">Temperature (C / F / K)</option>
        </select>
      </div>

      <div class="io-grid">
        <div class="io-card card">
          <label for="input-value" class="input-label">From</label>
          <input type="number" id="input-value" value="1" class="num-input text-input">
          <select id="input-unit" class="select-input" style="margin-top: 0.5rem;"></select>
        </div>

        <div class="io-card card">
          <label for="output-value" class="input-label">To</label>
          <input type="number" id="output-value" readonly class="num-input readonly-input text-input">
          <select id="output-unit" class="select-input" style="margin-top: 0.5rem;"></select>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
